spring.application.name=backend

#DATA SOURCE
spring.datasource.url=jdbc:mariadb://localhost:3307/handbagdb
spring.datasource.username=root
spring.datasource.password=08012004
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT
jwt.secret=d5f3eb4588e778789a996ea539b51df72c10d707e14012b621308dc1860502b9

#SESSION
spring.session.store-type=redis
spring.session.timeout=2h
server.servlet.session.cookie.name=SHOP_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

# -------------- REDIS -----------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# -------------- CORS ------------------
spring.graphql.cors.allowed-origins=http://localhost:5173
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true

# -------------- FILE UPLOAD -----------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.file.upload.dir=uploads

# -------------- LOGGING ---------------
logging.level.iuh.fit.se.backend=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

# -------------- SERVER ----------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# -------------- VNPAY ----------------
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}

vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.ipn-url=${VNPAY_IPN_URL}

vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.locale=vn
vnpay.order-type=other

# -------------- ChatBot AI ----------------
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=openrouter/free
