spring.application.name=backend

#DATA SOURCE
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/handbagdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}

#JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# JWT
jwt.secret=${JWT_SECRET:d5f3eb4588e778789a996ea539b51df72c10d707e14012b621308dc1860502b9}

#SESSION
spring.session.store-type=redis
spring.session.timeout=2h
server.servlet.session.cookie.name=SHOP_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# -------------- REDIS -----------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# -------------- CORS ------------------
spring.graphql.cors.allowed-origins=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://crystal-handbags.vercel.app}
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true

# -------------- FILE UPLOAD -----------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.file.upload.dir=uploads

# -------------- LOGGING ---------------
logging.level.iuh.fit.se.backend=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

# -------------- SERVER ----------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# -------------- VNPAY ----------------
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}

vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}

vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.locale=vn
vnpay.order-type=other

# -------------- ChatBot AI ----------------
spring.ai.openai.api-key=${OPENROUTER_API_KEY:}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=openrouter/free

# -------------- RABBITMQ ----------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

app.rabbitmq.exchange=ecommerce.exchange
app.rabbitmq.routing-key.order-created=order.created
app.rabbitmq.routing-key.order-cancelled=order.cancelled
app.rabbitmq.routing-key.payment-succeeded=payment.succeeded
app.rabbitmq.routing-key.payment-failed=payment.failed
app.rabbitmq.queue.order-created=order.created.queue
app.rabbitmq.queue.order-cancelled=order.cancelled.queue
app.rabbitmq.queue.payment-succeeded=payment.succeeded.queue
app.rabbitmq.queue.payment-failed=payment.failed.queue

# -------------- MAIL (GMAIL SMTP) ----------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -------------- OTP ----------------
app.otp.expiry-minutes=5

# -------------- FRONTEND URL ----------------
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# -------------- AWS S3 ----------------
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_REGION:ap-southeast-1}
